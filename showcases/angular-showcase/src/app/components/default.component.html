<div class="default-container">
	<div class="component-header">
		<h1>{{ title }}</h1>
	</div>
	@for (variant of variants; track variant; let variantIndex = $index) {
		<div>
			<db-divider></db-divider>
			<a
				class="db-link link-headline"
				data-content="external"
				target="_blank"
				rel="noopener noreferrer"
				[href]="getLink(variant.name)"
			>
				<span>{{ variant.name }}</span>
			</a>

			<db-card class="variants-card" [elevationLevel]="getElevation()">
				<!-- Breadcrumb renders its own <nav>; suppress wrapper landmarks to avoid duplicates -->
				<div
					class="variants-list"
					[attr.aria-label]="
						title === 'DBBreadcrumb'
							? undefined
							: variant.role
								? variant.name
								: undefined
					"
					[attr.role]="
						title === 'DBBreadcrumb' ? undefined : variant.role
					"
				>
					@for (
						example of variant.examples;
						track example;
						let exampleIndex = $index
					) {
						<div
							[style]="example.style"
							[class]="example.className"
							[attr.data-density]="example.density"
						>
							<ng-container
								*ngTemplateOutlet="
									exampleTemplate;
									context: {
										exampleProps: example.props ?? {},
										exampleName: example.name,
										exampleIndex: exampleIndex,
										variantIndex: variantIndex
									}
								"
							>
							</ng-container>
						</div>
					}
				</div>
			</db-card>
		</div>
	}
</div>
