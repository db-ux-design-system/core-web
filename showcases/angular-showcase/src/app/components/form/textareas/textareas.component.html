<app-form-wrapper
	[control]="formControl.value"
	[model]="ngModel"
	[plain]="plain"
>
	<fieldset>
		<legend>Different form approaches</legend>
		<db-textarea
			(change)="handlePlainChange($event)"
			[value]="plain"
			label="Plain"
			message="Description"
			name="textarea-name"
			placeholder="Placeholder"
		/>
		<db-textarea
			[(ngmodel)]="ngModel"
			label="ngModel"
			message="Description"
			name="textarea-name"
			placeholder="Placeholder"
		/>
		<db-textarea
			[formcontrol]="formControl"
			label="formControl"
			message="Description"
			name="textarea-name"
			placeholder="Placeholder"
		/>
	</fieldset>
</app-form-wrapper>
