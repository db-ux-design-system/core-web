<app-form-wrapper
	[control]="formControl.value"
	[model]="ngModel"
	[plain]="plain"
	[signalForms]="signalForm.values().value()"
>
	<fieldset>
		<legend>Different form approaches</legend>
		<db-custom-select
			(optionSelected)="handlePlainChange($event)"
			[options]="options"
			[values]="plain"
			label="Plain"
		>
		</db-custom-select>
		<db-custom-select
			[(ngModel)]="ngModel"
			[options]="options"
			label="ngModel"
		>
		</db-custom-select>
		<db-custom-select
			[formControl]="formControl"
			[options]="options"
			label="formControl"
		>
		</db-custom-select>
		<db-custom-select
			[formField]="signalForm.values"
			[options]="options"
			label="signalForms"
		>
		</db-custom-select>
	</fieldset>
</app-form-wrapper>
