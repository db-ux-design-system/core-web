<app-form-wrapper
	[control]="formControl.value"
	[model]="ngModel"
	[plain]="plain"
	[signalForms]="signalForm.value().value()"
>
	<fieldset>
		<legend>Different form approaches</legend>
		<db-input
			(change)="handlePlainChange($event)"
			[value]="plain"
			icon="x_placeholder"
			label="Plain"
			message="Description"
			name="input-name"
			placeholder="Placeholder"
		/>
		<db-input
			[(ngModel)]="ngModel"
			icon="x_placeholder"
			label="ngModel"
			message="Description"
			name="input-name"
			placeholder="Placeholder"
		/>
		<db-input
			[formControl]="formControl"
			icon="x_placeholder"
			label="formControl"
			message="Description"
			name="input-name"
			placeholder="Placeholder"
		/>
		<app-signal-forms-input [formField]="signalForm.value" />
	</fieldset>
	<fieldset>
		<legend>Date inputs</legend>
		<db-input
			(change)="handleDatePlainChange($event)"
			[value]="datePlain"
			label="Date (plain)"
			name="input-date-plain"
			type="date"
		/>
		<db-input
			[(ngModel)]="dateNgModel"
			label="Date (ngModel)"
			name="input-date-ngmodel"
			type="date"
		/>
		<db-input
			[formControl]="dateFormControl"
			label="Date (formControl)"
			name="input-date-formcontrol"
			type="date"
		/>
	</fieldset>
</app-form-wrapper>
