<app-form-wrapper
	[control]="formControl.value"
	[model]="ngModel"
	[plain]="plain"
>
	<fieldset>
		<legend>Different form approaches</legend>
		<db-switch
			(change)="handlePlainChange($event)"
			[checked]="plain"
			label="Plain"
			name="switch"
		></db-switch>
		<db-switch [(ngModel)]="ngModel" label="ngModel" name="switch"></db-switch>
		<db-switch
			[formControl]="formControl"
			label="formControl"
			name="switch"
		></db-switch>
	</fieldset>
</app-form-wrapper>
