@if (page) {
	<div [class]="getFullscreenClasses()">
		<router-outlet></router-outlet>
	</div>
}
@if (!page) {
	<db-shell
		[fadeIn]="true"
		[controlPanelDesktopPosition]="settings.controlPanelDesktopPosition"
		[controlPanelMobilePosition]="settings.controlPanelMobilePosition"
		[subNavigationDesktopPosition]="settings.subNavigationDesktopPosition"
		[subNavigationMobilePosition]="settings.subNavigationMobilePosition"
		[showSubNavigation]="settings.subNavigation === 'true'"
	>
		<db-shell-sub-navigation>
			<db-control-panel-navigation
				aria-label="sub-navigation"
				[variant]="settings.subNavigationVariant"
			>
				@for (item of navigationItems; track item.label) {
					<app-nav-item [navItem]="item"> </app-nav-item>
				}</db-control-panel-navigation
		></db-shell-sub-navigation>

		<db-control-panel-desktop>
			<db-control-panel-brand
				brand
				data-logo="db-systel"
			></db-control-panel-brand>
			<app-meta-navigation meta-navigation />
			<app-primary-actions
				primary-actions
				[density]="density"
				[color]="color"
				[settings]="settings"
			></app-primary-actions>
			<app-secondary-actions secondary-actions></app-secondary-actions>
			<db-control-panel-navigation
				aria-label="desktop-navigation"
				[variant]="settings.navigationDesktopVariant"
			>
				@for (item of navigationItems; track item.label) {
					<app-nav-item [navItem]="item"> </app-nav-item>
				}
			</db-control-panel-navigation>
		</db-control-panel-desktop>
		<db-control-panel-mobile drawerHeaderText="Showcase">
			<db-control-panel-brand
				brand
				data-logo="db-systel"
			></db-control-panel-brand>
			<app-meta-navigation meta-navigation />
			<app-primary-actions
				primary-actions
				[density]="density"
				[color]="color"
				[settings]="settings"
			></app-primary-actions>
			<app-secondary-actions secondary-actions></app-secondary-actions>
			<db-control-panel-navigation
				aria-label="mobile-navigation"
				[variant]="settings.navigationMobileVariant"
			>
				@for (item of navigationItems; track item.label) {
					<app-nav-item [navItem]="item"> </app-nav-item>
				}
			</db-control-panel-navigation>
		</db-control-panel-mobile>
		<db-shell-content [class]="getChangeableClasses()">
			<router-outlet></router-outlet>
		</db-shell-content>
	</db-shell>
}
