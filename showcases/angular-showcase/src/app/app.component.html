@if (page) {
	<div [class]="getChangeableClasses()">
		<router-outlet></router-outlet>
	</div>
}
@if (!page) {
	<db-page [fadein]="true" documentoverflow="auto" variant="fixed">
		<db-header
			(toggle)="toggleDrawer($event)"
			[draweropen]="drawerOpen"
			header
		>
			<db-brand brand>Showcase</db-brand>
			<db-navigation *dbnavigation aria-label="main-navigation">
				@for (item of navigationItems; track item.label) {
					<app-nav-item [navitem]="item"> </app-nav-item>
				}
			</db-navigation>
			<ng-container *dbmetanavigation>
				<db-select
					(change)="onChange($event)"
					[(ngModel)]="density"
					label="Density"
					variant="floating"
				>
					@for (t of densities; track t) {
						<option>
							{{ t }}
						</option>
					}
				</db-select>
				<db-select
					(change)="onChange($event)"
					[(ngmodel)]="color"
					label="Color"
					variant="floating"
				>
					@for (c of colors; track c) {
						<option>
							{{ c }}
						</option>
					}
				</db-select>
			</ng-container>
			<ng-container primary-action>
				<db-button
					[notext]="true"
					icon="magnifying_glass"
					variant="ghost"
					>Search</db-button
				>
			</ng-container>
			<ng-container *dbsecondaryaction>
				<db-button [notext]="true" icon="x_placeholder" variant="ghost">
					Profile
				</db-button>
				<db-button [notext]="true" icon="x_placeholder" variant="ghost">
					Notification
				</db-button>
				<db-button [noText]="true" icon="x_placeholder" variant="ghost">
					Help
				</db-button>
			</ng-container>
		</db-header>
		<div [class]="getChangeableClasses()">
			<router-outlet></router-outlet>
		</div>
	</db-page>
}
