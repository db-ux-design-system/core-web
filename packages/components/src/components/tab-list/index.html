<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>DBTabList</title>
		<link rel="stylesheet" href="/styles/relative.css" />
	</head>
	<body style="padding: var(--db-spacing-fixed-md)">
		<h1>Horizontal</h1>
		<div class="db-tab-list" role="tablist" aria-orientation="horizontal">
			<button type="button" class="db-tab-item" role="tab">
				<span class="db-tab-label">label 1</span>
			</button>

			<button
				type="button"
				class="db-tab-item"
				role="tab"
				aria-selected="true"
			>
				<span class="db-tab-label">active</span>
			</button>

			<button type="button" class="db-tab-item" role="tab">
				<span class="db-tab-label" data-icon="x_placeholder">
					icon - text (leading)
				</span>
			</button>

			<button type="button" class="db-tab-item" role="tab">
				<span class="db-tab-label" data-icon-trailing="x_placeholder">
					text - icon (trailing)
				</span>
			</button>
		</div>

		<h1>Vertical</h1>
		<div
			class="db-tab-list"
			role="tablist"
			aria-orientation="vertical"
			data-orientation="vertical"
		>
			<button type="button" class="db-tab-item" role="tab">
				<span class="db-tab-label">label 1</span>
			</button>

			<button
				type="button"
				class="db-tab-item"
				role="tab"
				aria-selected="true"
			>
				<span class="db-tab-label">active</span>
			</button>

			<button type="button" class="db-tab-item" role="tab">
				<span class="db-tab-label" data-icon="x_placeholder">
					icon - text (leading)
				</span>
			</button>

			<button type="button" class="db-tab-item" role="tab">
				<span class="db-tab-label" data-icon-trailing="x_placeholder">
					text - icon (trailing)
				</span>
			</button>
		</div>
	</body>
</html>
