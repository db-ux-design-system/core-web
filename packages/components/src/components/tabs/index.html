<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>DBTabs</title>
		<link rel="stylesheet" href="/styles/relative.css" />
	</head>
	<body style="padding: var(--db-spacing-fixed-md)">
		<div class="db-tabs">
			<div
				role="tablist"
				class="db-tab-list"
				aria-label="Example Tabs"
				aria-orientation="horizontal"
			>
				<button
					type="button"
					class="db-tab-item"
					role="tab"
					id="example-tab-0"
					aria-controls="example-tab-panel-0"
					aria-selected="true"
					tabindex="0"
				>
					<span class="db-tab-label">Test 1</span>
				</button>
				<button
					type="button"
					class="db-tab-item"
					role="tab"
					id="example-tab-1"
					aria-controls="example-tab-panel-1"
					aria-selected="false"
					tabindex="-1"
				>
					<span class="db-tab-label">Test 2</span>
				</button>
				<button
					type="button"
					class="db-tab-item"
					role="tab"
					id="example-tab-2"
					aria-controls="example-tab-panel-2"
					aria-selected="false"
					tabindex="-1"
				>
					<span class="db-tab-label">Test 3</span>
				</button>
			</div>
			<div
				role="tabpanel"
				class="db-tab-panel"
				id="example-tab-panel-0"
				aria-labelledby="example-tab-0"
			>
				Tab Panel 1
			</div>
			<div
				role="tabpanel"
				class="db-tab-panel"
				id="example-tab-panel-1"
				aria-labelledby="example-tab-1"
				hidden
			>
				Tab Panel 2
			</div>
			<div
				role="tabpanel"
				class="db-tab-panel"
				id="example-tab-panel-2"
				aria-labelledby="example-tab-2"
				hidden
			>
				Tab Panel 3
			</div>
		</div>
	</body>
</html>
