---
name: On-PR to main

on:
  pull_request:
    branches: ["main"]

permissions:
  pull-requests: write
  contents: write
  actions: read
  security-events: write

jobs:
  dependabot:
    uses: ./.github/workflows/99-auto-handle-dependabot.yml

  dependency-review:
    uses: ./.github/workflows/99-dependency-review.yml

  dependabot-review:
    uses: ./.github/workflows/99-dependabot-review.yml

  labeler:
    if: github.event.pull_request.head.repo.full_name == github.repository
    uses: ./.github/workflows/99-labeler.yml
