name: 🎭 Playwright E2E

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string

permissions:
  actions: write
  contents: write

jobs:
  playwright-foundations:
    name: 🧪🎭 - foundations
    runs-on: ubuntu-24.04 # Use Ubuntu 24.04 explicitly
    container:
      image: mcr.microsoft.com/playwright:v${{ inputs.version }}
      options: --user 1001
    steps:
      - name: ⏬ Checkout repo
        uses: actions/checkout@v6.0.2

      - name: 🔄 Init Cache
        uses: ./.github/actions/pnpm-cache
        env:
          ASSET_INIT_VECTOR: ${{ secrets.ASSET_INIT_VECTOR }}
          ASSET_PASSWORD: ${{ secrets.ASSET_PASSWORD }}

      - name: ⏬ Download foundations build
        uses: actions/download-artifact@v8
        with:
          name: db-ux-foundations-build
          path: packages/foundations/build

      - name: 👩‍🔬 Test with Playwright 🎭
        working-directory: ./packages/foundations
        run: pnpm run test:e2e

      - name: 🆙 Upload test results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: foundations-playwright-results
          path: ./packages/foundations/test-results
          retention-days: 30
