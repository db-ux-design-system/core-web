---
name: Build Packages

permissions:
  contents: read

on:
  workflow_call:

jobs:
  build-stencil-targets:
    name: Build Packages
    runs-on: ubuntu-24.04 # Use Ubuntu 24.04 explicitly
    steps:
      - name: ⏬ Checkout repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: 🔄 Init Cache
        uses: ./.github/actions/pnpm-cache
        env:
          ASSET_INIT_VECTOR: ${{ secrets.ASSET_INIT_VECTOR }}
          ASSET_PASSWORD: ${{ secrets.ASSET_PASSWORD }}

      - name: 🔨 Build Packages
        run: |
          pnpm run build
          pnpm --filter scripts run docs-file-references

      - name: ⏫ Upload foundations build
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: db-ux-foundations-build
          path: packages/foundations/build

      - name: ⏫ Upload output
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: db-ux-output
          path: output

      - name: ⏫ Upload components build
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: db-ux-components-build
          path: packages/components/build

      - name: ⏫ Upload migration build
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: db-ux-migration-build
          path: packages/migration/build

      - name: ⏫ Upload stylelint build
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: db-ux-stylelint-build
          path: packages/stylelint/build

      - name: ⏫ Upload eslint-plugin build
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: db-ux-eslint-plugin-build
          path: packages/eslint-plugin/build

      - name: ⏫ Upload postcss-plugin build
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: db-ux-postcss-plugin-build
          path: packages/postcss-plugin/build

      - name: ⏫ Upload vite-plugin build
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: db-ux-vite-plugin-build
          path: packages/vite-plugin/build

      - name: ⏫ Upload agent-cli build
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: db-ux-agent-cli-build
          path: packages/agent-cli/build

      - name: ⏫ Upload mcp-server build
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: db-ux-mcp-server-build
          path: packages/mcp-server/dist
          retention-days: 1
