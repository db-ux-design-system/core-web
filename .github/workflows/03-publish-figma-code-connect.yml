---
name: Publish to figma code-connect

permissions:
  contents: read

on:
  workflow_call:

jobs:
  publish-figma-code-connect:
    name: Publish to figma code-connect
    runs-on: ubuntu-24.04 # Use Ubuntu 24.04 explicitly
    strategy:
      fail-fast: false
      matrix:
        target: [angular, react, vue]
    steps:
      - name: ⏬ Checkout repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: 🔄 Init Cache
        uses: ./.github/actions/pnpm-cache

      - name: ⏬ Download figma code connect
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: figma-code-connect
          path: figma-code-connect

      - name: 🎨 Generate icon batch files
        env:
          FIGMA_ACCESS_TOKEN: ${{ secrets.FIGMA_ACCESS_TOKEN }}
          FIGMA_ICON_FILE: ${{ vars.FIGMA_ICON_FILE }}
        run: |
          node --import tsx/esm figma-code-connect/generate-icons.ts

      - name: 🖌️🔌 Publish
        env:
          FIGMA_ACCESS_TOKEN: ${{ secrets.FIGMA_ACCESS_TOKEN }}
        run: |
          pnpm --filter=${{ matrix.target }}-figma run connect
