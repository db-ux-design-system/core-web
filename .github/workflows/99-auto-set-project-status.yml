---
name: 🗿 Auto set project status

on:
  workflow_call:

jobs:
  set-status:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write
      repository-projects: write
    steps:
      # SECURITY: Explicitly check out the default branch as defense-in-depth.
      # The caller uses pull_request_target (which already defaults to base),
      # but pinning the ref here prevents regressions if the trigger changes.
      - name: ⬇️ Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.repository.default_branch }}

      # Node 24 (see .nvmrc) can execute TypeScript files natively via type
      # stripping, so no separate tsx/ts-node runtime is required.
      - name: 🆙 Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"

      # https://docs.github.com/en/apps/creating-github-apps/authenticating-with-a-github-app/making-authenticated-api-requests-with-a-github-app-in-a-github-actions-workflow
      - name: 🧬 Generate a token
        id: generate-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.AUTO_MERGE_CLIENT_ID }}
          private-key: ${{ secrets.AUTO_MERGE_PRIVATE_KEY }}

      - name: 🗿 Set project status
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
          PROJECT_NUMBER: ${{ vars.PROJECT_NUMBER }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          EVENT_ACTION: ${{ github.event.action }}
          IS_DRAFT: ${{ github.event.pull_request.draft }}
        run: node scripts/github/set-project-status.ts
        continue-on-error: true
