---
# SECURITY: This workflow uses pull_request_target so it always runs from the
# base branch (main). This is critical because it generates a GitHub App token
# with elevated permissions (bypass branch protection for merge). By running
# from main, a PR author cannot modify this workflow to exfiltrate the token.
#
# IMPORTANT: Never check out or execute code from the PR head ref here.
# The only operation is a squash-merge of a labeled, automated PR.
#
# Multiple trust checks are enforced before minting the token:
#   1. PR must carry the "🔄automated" label
#   2. PR must be authored by github-actions[bot]
#   3. PR must target a feature branch (not main) — automated fix PRs always
#      target the original PR's branch, never the default branch directly
name: 🤖 Auto-merge automated PRs

permissions:
  contents: write
  pull-requests: write

on:
  pull_request_target:
    types: [labeled, opened, synchronize]

jobs:
  auto-merge:
    name: Squash-merge automated PR
    runs-on: ubuntu-24.04
    if: >-
      contains(github.event.pull_request.labels.*.name, '🔄automated') &&
      github.event.pull_request.user.login == 'github-actions[bot]' &&
      github.event.pull_request.base.ref != github.event.repository.default_branch
    steps:
      - name: 🧬 Generate a token
        id: generate-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.AUTO_MERGE_CLIENT_ID }}
          private-key: ${{ secrets.AUTO_MERGE_PRIVATE_KEY }}

      - name: 🤖 Squash-merge the PR
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge --squash "$PR_URL"
