---
name: Build outputs

permissions:
  contents: read

on:
  workflow_call:

jobs:
  build-showcases:
    name: Build outputs
    runs-on: ubuntu-24.04 # Use Ubuntu 24.04 explicitly
    steps:
      - name: ⏬ Checkout repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: 🔄 Init Cache
        uses: ./.github/actions/pnpm-cache
        env:
          ASSET_INIT_VECTOR: ${{ secrets.ASSET_INIT_VECTOR }}
          ASSET_PASSWORD: ${{ secrets.ASSET_PASSWORD }}

      - name: ⏬ Download foundations build
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: db-ux-foundations-build
          path: packages/foundations/build

      - name: ⏬ Download components build
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: db-ux-components-build
          path: packages/components/build

      - name: ⏬ Download migration build
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: db-ux-migration-build
          path: packages/migration/build

      - name: ⏬ Download stylelint build
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: db-ux-stylelint-build
          path: packages/stylelint/build

      - name: ⏬ Download eslint-plugin build
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: db-ux-eslint-plugin-build
          path: packages/eslint-plugin/build

      - name: ⏬ Download postcss-plugin build
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: db-ux-postcss-plugin-build
          path: packages/postcss-plugin/build

      - name: ⏬ Download vite-plugin build
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: db-ux-vite-plugin-build
          path: packages/vite-plugin/build

      - name: ⏬ Download agent-cli build
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: db-ux-agent-cli-build
          path: packages/agent-cli/build

      - name: ⏬ Download mcp-server build
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: db-ux-mcp-server-build
          path: packages/mcp-server/dist

      - name: ⏬ Download output
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: db-ux-output
          path: output

      - name: 🔨 Build outputs
        run: |
          pnpm run generate:agent
          pnpm run build-outputs

      - name: 📦 Validate Package Publishing
        run: |
          pnpm run lint-packages
          pnpm run lint-docs-file-references

      - name: ⏫ Upload outputs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: db-ux-outputs
          path: build-outputs
