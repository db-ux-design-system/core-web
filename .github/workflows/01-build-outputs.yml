---
name: Build outputs

permissions:
  contents: read

on:
  workflow_call:

jobs:
  build-showcases:
    name: Build outputs
    runs-on: ubuntu-24.04 # Use Ubuntu 24.04 explicitly
    steps:
      - name: ⏬ Checkout repo
        uses: actions/checkout@v6

      - name: 🔄 Init Cache
        uses: ./.github/actions/npm-cache

      - name: ⏬ Download foundations build
        uses: actions/download-artifact@v8
        with:
          name: db-ux-foundations-build
          path: packages/foundations/build

      - name: ⏬ Download components build
        uses: actions/download-artifact@v8
        with:
          name: db-ux-components-build
          path: packages/components/build

      - name: ⏬ Download migration build
        uses: actions/download-artifact@v8
        with:
          name: db-ux-migration-build
          path: packages/migration/build

      - name: ⏬ Download stylelint build
        uses: actions/download-artifact@v8
        with:
          name: db-ux-stylelint-build
          path: packages/stylelint/build

      - name: ⏬ Download eslint-plugin build
        uses: actions/download-artifact@v8
        with:
          name: db-ux-eslint-plugin-build
          path: packages/eslint-plugin/build

      - name: ⏬ Download agent-cli build
        uses: actions/download-artifact@v8
        with:
          name: db-ux-agent-cli-build
          path: packages/agent-cli/build

      - name: ⏬ Download mcp-server build
        uses: actions/download-artifact@v8
        with:
          name: db-ux-mcp-server-build
          path: packages/mcp-server/dist

      - name: ⏬ Download output
        uses: actions/download-artifact@v8
        with:
          name: db-ux-output
          path: output

      - name: 🔨 Build outputs
        run: |
          npm run generate:agent
          npm run build-outputs

      - name: 📦 Validate Package Publishing
        run: |
          npm run lint-packages
          npm run lint-docs-file-references

      - name: ⏫ Upload outputs
        uses: actions/upload-artifact@v7
        with:
          name: db-ux-outputs
          path: build-outputs
