---
name: Build outputs

permissions:
  contents: read

on:
  workflow_call:

jobs:
  build-showcases:
    name: Build outputs
    runs-on: ubuntu-24.04 # Use Ubuntu 24.04 explicitly
    steps:
      - name: ⏬ Checkout repo
        uses: actions/checkout@v6

      - name: 🔄 Init Cache
        uses: ./.github/actions/npm-cache

      - name: ⏬ Download foundations build
        uses: actions/download-artifact@v8
        with:
          name: db-ux-foundations-build
          path: packages/foundations/build

      - name: ⏬ Download components build
        uses: actions/download-artifact@v8
        with:
          name: db-ux-components-build
          path: packages/components/build

      - name: ⏬ Download migration build
        uses: actions/download-artifact@v8
        with:
          name: db-ux-migration-build
          path: packages/migration/build

      - name: ⏬ Download stylelint build
        uses: actions/download-artifact@v8
        with:
          name: db-ux-stylelint-build
          path: packages/stylelint/build

      - name: ⏬ Download eslint-plugin build
        uses: actions/download-artifact@v8
        with:
          name: db-ux-eslint-plugin-build
          path: packages/eslint-plugin/build

      - name: ⏬ Download agent-cli build
        uses: actions/download-artifact@v8
        with:
          name: db-ux-agent-cli-build
          path: packages/agent-cli/build

      - name: ⏬ Download framework sources
        uses: actions/download-artifact@v8
        with:
          name: db-ux-framework-sources
          path: packages

      - name: 📥 Install output dependencies
        run: pnpm install

      - name: 🔨 Build outputs
        run: |
          pnpm run generate:agent
          pnpm run build-outputs

      - name: 📦 Validate Package Publishing
        run: |
          pnpm run lint-packages
          pnpm run lint-docs-file-references

      - name: ⏫ Upload framework outputs
        uses: actions/upload-artifact@v6
        with:
          name: db-ux-framework-outputs
          path: |
            packages/ngx-core-components/dist
            packages/ngx-core-components/agent
            packages/react-core-components/dist
            packages/react-core-components/agent
            packages/v-core-components/dist
            packages/v-core-components/agent
            packages/wc-core-components/dist
            packages/wc-core-components/agent
