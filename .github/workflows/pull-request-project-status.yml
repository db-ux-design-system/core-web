---
name: PR project status

permissions:
  contents: read
  pull-requests: write
  repository-projects: write

on:
  pull_request:
    types:
      - assigned
      - unassigned
      - opened
      - edited
      - closed
      - reopened
      - synchronize
      - converted_to_draft
      - ready_for_review
      - review_requested
      - review_request_removed

jobs:
  auto-set-project-status:
    # Run for repository (non-fork) PRs. Dependabot/Bot PRs are intentionally
    # included so non-patch Dependabot updates get moved to "🎁 Ready for review".
    if: github.event.pull_request.head.repo.full_name == github.repository
    uses: ./.github/workflows/99-auto-set-project-status.yml
    secrets: inherit
