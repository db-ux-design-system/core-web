---
name: PR project status

permissions:
  contents: read
  pull-requests: write
  repository-projects: write

# SECURITY: Uses pull_request_target so that both this workflow and any locally
# referenced reusable workflows are always loaded from the base branch (main),
# not from the PR merge commit. This prevents a PR author from modifying the
# workflow definition or injecting steps that could exfiltrate the GitHub App
# token used for organization project access.
# IMPORTANT: Never check out or execute code from the PR head ref in this
# workflow or its callees — doing so would re-introduce the same vulnerability.
on:
  pull_request_target:
    branches: ["main"]
    types:
      - assigned
      - unassigned
      - opened
      - edited
      - closed
      - reopened
      - synchronize
      - converted_to_draft
      - ready_for_review
      - review_requested
      - review_request_removed

jobs:
  auto-set-project-status:
    # Run for repository (non-fork) PRs. Dependabot/Bot PRs are intentionally
    # included so non-patch Dependabot updates get moved to "🎁 Ready for review".
    if: github.event.pull_request.head.repo.full_name == github.repository
    uses: ./.github/workflows/99-auto-set-project-status.yml
    secrets: inherit
