---
name: Build Stories

permissions:
  contents: read

on:
  workflow_call:

jobs:
  build-stories:
    name: Build Stories
    runs-on: ubuntu-24.04 # Use Ubuntu 24.04 explicitly
    steps:
      - name: ⏬ Checkout repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: 🔄 Init Cache
        uses: ./.github/actions/pnpm-cache
        env:
          ASSET_INIT_VECTOR: ${{ secrets.ASSET_INIT_VECTOR }}
          ASSET_PASSWORD: ${{ secrets.ASSET_PASSWORD }}

      - name: 🔨 Build Packages
        run: |
          pnpm --filter @db-ux/core-components run generate:stories

      - name: ⏫ Upload angular stories
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: angular-storybook-stories
          path: storybooks/angular-storybook/src

      - name: ⏫ Upload react stories
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: react-storybook-stories
          path: storybooks/react-storybook/src

      - name: ⏫ Upload vue stories
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: vue-storybook-stories
          path: storybooks/vue-storybook/src
