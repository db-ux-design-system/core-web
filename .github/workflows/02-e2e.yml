name: 🎭 Playwright E2E

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string

permissions:
  actions: write
  contents: write

jobs:
  playwright-ct:
    name: 🧪🎭 - ${{ matrix.framework }}:${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
    runs-on: ubuntu-24.04 # Use Ubuntu 24.04 explicitly
    container:
      image: mcr.microsoft.com/playwright:v${{ inputs.version }}
      options: --user 1001
    strategy:
      fail-fast: false
      matrix:
        framework: [react, vue]
        shardIndex: [1, 2]
        shardTotal: [2]
    steps:
      - name: ⏬ Checkout repo
        uses: actions/checkout@v6

      - name: 🔄 Init Cache
        uses: ./.github/actions/npm-cache

      - name: ⏬ Download foundations build
        uses: actions/download-artifact@v8
        with:
          name: db-ux-foundations-build
          path: packages/foundations/build

      - name: ⏬ Download framework sources
        uses: actions/download-artifact@v8
        with:
          name: db-ux-framework-sources
          path: packages

      - name: ⏬ Download components styles build
        uses: actions/download-artifact@v8
        with:
          name: db-ux-components-build
          path: packages/components/build

      - name: 🚋 Get working directory
        id: workingDirectory
        shell: bash
        run: |
          case "${{ matrix.framework }}" in
            "react") echo "dir=react-core-components" >> $GITHUB_OUTPUT ;;
            "vue") echo "dir=v-core-components" >> $GITHUB_OUTPUT ;;
            *) echo "dir=${{ matrix.framework }}" >> $GITHUB_OUTPUT ;;
          esac

      - name: 👩‍🔬 Test with Playwright 🎭
        working-directory: ./packages/${{ steps.workingDirectory.outputs.dir }}
        run: pnpm exec playwright test --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}

      - name: 🔣 Print GitHub Report
        if: failure()
        working-directory: ./packages/${{ steps.workingDirectory.outputs.dir }}
        shell: bash
        run: |
          pnpm exec playwright merge-reports --reporter github ./blob-report

      - name: 🆙 Upload test results
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.framework }}-components-playwright-results-${{ matrix.shardIndex }}
          path: ./packages/${{ steps.workingDirectory.outputs.dir }}/test-results
          retention-days: 30
