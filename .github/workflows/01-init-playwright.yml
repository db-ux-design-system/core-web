name: 🎭 Init Playwright

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string

jobs:
  init-playwright:
    name: 🎭 Init Playwright - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2022, macos-26]
    steps:
      - name: ⏬ Checkout repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: 🔄 Init Cache Default
        uses: ./.github/actions/pnpm-cache
        env:
          ASSET_INIT_VECTOR: ${{ secrets.ASSET_INIT_VECTOR }}
          ASSET_PASSWORD: ${{ secrets.ASSET_PASSWORD }}

      - name: 🔄 Init Playwright Cache
        uses: ./.github/actions/playwright-cache
        with:
          os: ${{ matrix.os }}
          version: ${{ inputs.version }}
