---
name: Reorder Backlog

permissions:
  contents: read
  issues: read

on:
  schedule:
    - cron: "0 6 * * 1" # Every Monday at 06:00 UTC
  workflow_dispatch: # Allow manual trigger

# Serialize runs so an overlapping manual dispatch and the scheduled run never
# mutate the project concurrently (which could post duplicate reminders or
# interleave position updates). Queue instead of cancelling an in-flight run.
concurrency:
  group: reorder-backlog
  cancel-in-progress: false

jobs:
  reorder:
    name: Reorder UX Engineering Backlog
    runs-on: ubuntu-24.04
    steps:
      - name: ⏬ Checkout repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: 🏗 Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc

      - name: 🧬 Generate a token
        id: generate-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.AUTO_MERGE_CLIENT_ID }}
          private-key: ${{ secrets.AUTO_MERGE_PRIVATE_KEY }}
          # Scope the token to the configured project owner/repository so the
          # PROJECT_OWNER / PROJECT_REPO overrides actually grant access there.
          # When the variables are unset these resolve to empty strings and the
          # action falls back to the current repository (least privilege).
          owner: ${{ vars.BACKLOG_PROJECT_OWNER }}
          repositories: ${{ vars.BACKLOG_PROJECT_REPO }}

      - name: 🔀 Reorder backlog
        run: node scripts/github/reorder-backlog.ts
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
          # Optional overrides. When the corresponding GitHub variable is not
          # set these resolve to an empty string and the script falls back to
          # its built-in defaults (see reorder-backlog.ts header).
          PROJECT_OWNER: ${{ vars.BACKLOG_PROJECT_OWNER }}
          PROJECT_REPO: ${{ vars.BACKLOG_PROJECT_REPO }}
          PROJECT_ID: ${{ vars.BACKLOG_PROJECT_ID }}
          PRIORITY_FIELD_ID: ${{ vars.BACKLOG_PRIORITY_FIELD_ID }}
          EFFORT_FIELD_ID: ${{ vars.BACKLOG_EFFORT_FIELD_ID }}
          STATUS_FIELD_ID: ${{ vars.BACKLOG_STATUS_FIELD_ID }}
          BACKLOG_OPTION_ID: ${{ vars.BACKLOG_STATUS_BACKLOG_OPTION_ID }}
          COMMUNITY_FEEDBACK_LABEL: ${{ vars.BACKLOG_COMMUNITY_FEEDBACK_LABEL }}
          WAITING_FOR_FEEDBACK_STATUS: ${{ vars.BACKLOG_WAITING_FOR_FEEDBACK_STATUS }}
          WAITING_FOR_FEEDBACK_OPTION_ID: ${{ vars.BACKLOG_WAITING_FOR_FEEDBACK_OPTION_ID }}
          REMINDER_BOT_LOGIN: ${{ vars.BACKLOG_REMINDER_BOT_LOGIN }}
          FEEDBACK_CODEOWNERS: ${{ vars.BACKLOG_FEEDBACK_CODEOWNERS }}
