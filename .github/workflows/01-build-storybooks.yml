---
name: Build Storybooks

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      storybook:
        required: true
        type: string
      baseUrl:
        required: true
        type: string

jobs:
  build-storybooks:
    name: Build Storybook ${{ inputs.storybook }}
    runs-on: ubuntu-24.04 # Use Ubuntu 24.04 explicitly
    steps:
      - name: ⏬ Checkout repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: 🔄 Init Cache
        uses: ./.github/actions/pnpm-cache
        env:
          ASSET_INIT_VECTOR: ${{ secrets.ASSET_INIT_VECTOR }}
          ASSET_PASSWORD: ${{ secrets.ASSET_PASSWORD }}

      - name: ⏬ Download foundations build
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: db-ux-foundations-build
          path: packages/foundations/build

      - name: ⏬ Download output
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: db-ux-output
          path: output

      - name: ⏬ Download components build
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: db-ux-components-build
          path: packages/components/build

      - name: ⏫ Download stories
        if: ${{ inputs.storybook != 'composition-storybook' && inputs.storybook != 'html-storybook' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ inputs.storybook }}-stories
          path: storybooks/${{ inputs.storybook }}/src

      - name: ⏫ Download stories for html-storybook
        if: ${{ inputs.storybook == 'html-storybook' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: react-storybook-stories
          path: storybooks/react-storybook/src/components

      - name: 🔨 Build ${{ inputs.storybook }}
        env:
          ASSET_INIT_VECTOR: ${{ secrets.ASSET_INIT_VECTOR }}
          ASSET_PASSWORD: ${{ secrets.ASSET_PASSWORD }}
          BASE_URL: ${{ inputs.baseUrl }}
        run: pnpm --filter ${{ inputs.storybook }} run build

      - name: ⏫ Upload ${{ inputs.storybook }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: db-ux-${{ inputs.storybook }}
          path: build-storybooks/${{ inputs.storybook }}
