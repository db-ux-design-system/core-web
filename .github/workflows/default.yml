---
name: Default Pipeline

permissions:
  contents: write
  actions: write
  pull-requests: write
  id-token: write

on:
  pull_request:
  push:
    branches:
      - "main"
  merge_group:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: >-
    ${{
      github.event_name == 'release' &&
      format('release-{0}', github.ref) ||
      github.event_name == 'merge_group' &&
      format('merge-queue-{0}', github.ref) ||
      format('{0}-{1}', github.workflow, github.ref)
    }}
  cancel-in-progress: >-
    ${{
      github.event_name != 'release' &&
      github.event_name != 'merge_group' &&
      github.ref != 'refs/heads/main'
    }}
# =============================================================================
# PATH-BASED OPTIMIZATION
# =============================================================================
# The init job detects which directories changed and outputs flags.
# Jobs use these flags to skip work that's irrelevant to the change.
#
# Change category → Jobs that run:
# - docs-only (*.md, .changeset/**, .amazonq/**, .claude/**, .kiro/**)  → lint only
# - foundations (packages/foundations/**)    → lint, build-packages, storybooks, patternhub, test-foundations
# - components (packages/components/**)     → lint, build-packages, storybooks, patternhub, showcases, test-components
# - output (output/**)                      → lint, build-packages, build-outputs, test-vite-plugin, showcases
# - showcases (showcases/**)               → lint, build-packages, showcase builds + tests
# - vite-plugin (packages/vite-plugin/**) → lint, build-packages, build-outputs, test-vite-plugin
# - figma (figma-code-connect/**, packages/components/**/figma/**) → lint, build-figma-code-connect, test-figma-code-connect
# - lint-only (eslint-plugin, stylelint, postcss-plugin) → lint only
# - root-config / needs-full-pipeline      → everything
#
# NOTE: .github/workflows/** changes are classified as root-config and
# trigger the full pipeline, because workflow changes can affect any job.
# Non-workflow .github/** files (e.g., CODEOWNERS, templates) are docs-only.
#
# Release and workflow_dispatch events always run the full pipeline.
# Push-to-main skips tests (merge queue already validated them).
# =============================================================================

jobs:
  init:
    uses: ./.github/workflows/00-init.yml
    secrets: inherit
    with:
      release: ${{ github.event_name == 'release' }}

  # Fail-fast: cancel the whole run as soon as any build job fails, to free up
  # runner minutes. Replaces the previous per-job cancel-on-failure-* jobs.
  # Skipped on release (we never want to abort a release run mid-flight).
  cancel-on-failure:
    if: >-
      ${{
        needs.init.outputs.eventVariant != 'release' &&
        !cancelled() &&
        contains(needs.*.result, 'failure')
      }}
    uses: ./.github/workflows/00-cancel-workflow.yml
    secrets: inherit
    needs:
      [
        init,
        lint,
        build-packages,
        build-figma-code-connect,
        build-stories,
        build-outputs,
        build-showcase-stencil,
        build-showcase-angular,
        build-showcase-angular-ssr,
        build-showcase-react,
        build-showcase-next,
        build-showcase-vue,
        build-showcase-nuxt,
        build-showcase-patternhub
      ]

  # Lint runs for all code changes (skips only on push-to-main and changeset releases)
  lint:
    if: >-
      ${{
        needs.init.outputs.eventVariant != 'changeset-release' &&
        needs.init.outputs.eventVariant != 'main-push'
      }}
    uses: ./.github/workflows/01-validate.yml
    needs: [init]
    secrets: inherit

  # Build packages when code changes affect foundations, components, output, showcases, or vite-plugin
  build-packages:
    if: >-
      ${{
        needs.init.outputs.eventVariant != 'changeset-release' &&
        needs.init.outputs.docsOnly != 'true'
      }}
    uses: ./.github/workflows/01-build-packages.yml
    needs: [init]
    secrets: inherit

  # Figma code connect: only when figma files changed or full pipeline needed
  build-figma-code-connect:
    if: >-
      ${{
        github.repository_owner == 'db-ux-design-system' &&
        needs.init.outputs.eventVariant != 'release' &&
        needs.init.outputs.eventVariant != 'changeset-release' &&
        needs.init.outputs.eventVariant != 'main-push' &&
        (needs.init.outputs.needsFullPipeline == 'true' || needs.init.outputs.changesFigma == 'true')
      }}
    uses: ./.github/workflows/01-build-figma-code-connect.yml
    needs: [init]

  # Build stories: needed for storybooks (only when examples or storybook config changed)
  build-stories:
    if: >-
      ${{
        needs.init.outputs.eventVariant != 'changeset-release' &&
        needs.init.outputs.docsOnly != 'true' &&
        (needs.init.outputs.needsFullPipeline == 'true' ||
         needs.init.outputs.changesStorybook == 'true')
      }}
    uses: ./.github/workflows/01-build-stories.yml
    needs: [init]
    secrets: inherit

  # Playwright init: only when tests will actually run
  init-playwright:
    if: >-
      ${{
        needs.init.outputs.eventVariant != 'changeset-release' &&
        needs.init.outputs.eventVariant != 'main-push' &&
        needs.init.outputs.docsOnly != 'true' &&
        (needs.init.outputs.needsFullPipeline == 'true' ||
         needs.init.outputs.changesFoundations == 'true' ||
         needs.init.outputs.changesComponents == 'true' ||
         needs.init.outputs.changesShowcases == 'true' ||
         needs.init.outputs.changesOutput == 'true')
      }}
    uses: ./.github/workflows/01-init-playwright.yml
    needs: [init]
    secrets: inherit
    with:
      version: ${{ needs.init.outputs.playwrightVersion }}

  # Build outputs: when output/, components, vite-plugin changed or full pipeline
  build-outputs:
    if: >-
      ${{
        needs.init.outputs.eventVariant != 'main-push' &&
        needs.init.outputs.docsOnly != 'true' &&
        (needs.init.outputs.needsFullPipeline == 'true' ||
         needs.init.outputs.changesComponents == 'true' ||
         needs.init.outputs.changesOutput == 'true' ||
         needs.init.outputs.changesVitePlugin == 'true')
      }}
    uses: ./.github/workflows/01-build-outputs.yml
    needs: [build-packages, init]
    secrets: inherit

  # Test vite-plugin: when output/, vite-plugin changed or full pipeline
  test-vite-plugin:
    if: >-
      ${{
        needs.init.outputs.eventVariant != 'main-push' &&
        needs.init.outputs.docsOnly != 'true' &&
        (needs.init.outputs.needsFullPipeline == 'true' ||
         needs.init.outputs.changesOutput == 'true' ||
         needs.init.outputs.changesVitePlugin == 'true')
      }}
    uses: ./.github/workflows/02-vite-plugin-test.yml
    needs: [build-outputs, init]
    secrets: inherit

  # Test figma code connect: only when figma files changed or full pipeline
  test-figma-code-connect:
    if: >-
      ${{
        github.repository_owner == 'db-ux-design-system' &&
        needs.init.outputs.eventVariant != 'release' &&
        needs.init.outputs.eventVariant != 'changeset-release' &&
        needs.init.outputs.eventVariant != 'main-push' &&
        (needs.init.outputs.needsFullPipeline == 'true' || needs.init.outputs.changesFigma == 'true')
      }}
    uses: ./.github/workflows/02-test-figma-code-connect.yml
    needs: [build-figma-code-connect, init]
    secrets: inherit

  # Test components: when components changed or full pipeline
  test-components:
    if: >-
      ${{
        needs.init.outputs.eventVariant != 'main-push' &&
        needs.init.outputs.docsOnly != 'true' &&
        (needs.init.outputs.needsFullPipeline == 'true' ||
         needs.init.outputs.changesComponents == 'true')
      }}
    uses: ./.github/workflows/02-e2e.yml
    needs: [build-packages, init]
    secrets: inherit
    with:
      version: ${{ needs.init.outputs.playwrightVersion }}

  # Test foundations: when foundations changed or full pipeline
  test-foundations:
    if: >-
      ${{
        needs.init.outputs.eventVariant != 'main-push' &&
        needs.init.outputs.docsOnly != 'true' &&
        (needs.init.outputs.needsFullPipeline == 'true' ||
         needs.init.outputs.changesFoundations == 'true')
      }}
    uses: ./.github/workflows/02-e2e-foundations.yml
    needs: [build-packages, init]
    secrets: inherit
    with:
      version: ${{ needs.init.outputs.playwrightVersion }}

  # Storybook builds: only when examples changed or storybook dependency updated
  build-storybook-composition:
    if: >-
      ${{
        needs.init.outputs.docsOnly != 'true' &&
        (needs.init.outputs.needsFullPipeline == 'true' ||
         needs.init.outputs.changesStorybook == 'true')
      }}
    uses: ./.github/workflows/01-build-storybooks.yml
    needs: [build-packages, init, build-stories]
    with:
      storybook: composition-storybook
      baseUrl: ${{ needs.init.outputs.baseUrl }}
    secrets: inherit

  build-storybook-angular:
    if: >-
      ${{
        needs.init.outputs.docsOnly != 'true' &&
        (needs.init.outputs.needsFullPipeline == 'true' ||
         needs.init.outputs.changesStorybook == 'true')
      }}
    uses: ./.github/workflows/01-build-storybooks.yml
    needs: [build-packages, init, build-stories]
    with:
      storybook: angular-storybook
      baseUrl: ${{ needs.init.outputs.baseUrl }}
    secrets: inherit

  build-storybook-react:
    if: >-
      ${{
        needs.init.outputs.docsOnly != 'true' &&
        (needs.init.outputs.needsFullPipeline == 'true' ||
         needs.init.outputs.changesStorybook == 'true')
      }}
    uses: ./.github/workflows/01-build-storybooks.yml
    needs: [build-packages, init, build-stories]
    with:
      storybook: react-storybook
      baseUrl: ${{ needs.init.outputs.baseUrl }}
    secrets: inherit

  build-storybook-vue:
    if: >-
      ${{
        needs.init.outputs.docsOnly != 'true' &&
        (needs.init.outputs.needsFullPipeline == 'true' ||
         needs.init.outputs.changesStorybook == 'true')
      }}
    uses: ./.github/workflows/01-build-storybooks.yml
    needs: [build-packages, init, build-stories]
    with:
      storybook: vue-storybook
      baseUrl: ${{ needs.init.outputs.baseUrl }}
    secrets: inherit

  build-storybook-html:
    if: >-
      ${{
        needs.init.outputs.docsOnly != 'true' &&
        (needs.init.outputs.needsFullPipeline == 'true' ||
         needs.init.outputs.changesStorybook == 'true')
      }}
    uses: ./.github/workflows/01-build-storybooks.yml
    needs: [build-packages, init, build-stories]
    with:
      storybook: html-storybook
      baseUrl: ${{ needs.init.outputs.baseUrl }}
    secrets: inherit

  # Showcase builds: when components, output, or showcases changed or full pipeline
  build-showcase-stencil:
    if: >-
      ${{
        needs.init.outputs.eventVariant != 'main-push' &&
        needs.init.outputs.docsOnly != 'true' &&
        (needs.init.outputs.needsFullPipeline == 'true' ||
         needs.init.outputs.changesComponents == 'true' ||
         needs.init.outputs.changesOutput == 'true' ||
         needs.init.outputs.changesShowcases == 'true')
      }}
    uses: ./.github/workflows/01-build-showcases.yml
    needs: [build-packages, init]
    secrets: inherit
    with:
      showcase: stencil-showcase

  build-showcase-angular:
    if: >-
      ${{
        needs.init.outputs.eventVariant != 'main-push' &&
        needs.init.outputs.docsOnly != 'true' &&
        (needs.init.outputs.needsFullPipeline == 'true' ||
         needs.init.outputs.changesComponents == 'true' ||
         needs.init.outputs.changesOutput == 'true' ||
         needs.init.outputs.changesShowcases == 'true')
      }}
    uses: ./.github/workflows/01-build-showcases.yml
    needs: [build-packages, init]
    secrets: inherit
    with:
      showcase: angular-showcase

  build-showcase-angular-ssr:
    if: >-
      ${{
        needs.init.outputs.eventVariant != 'main-push' &&
        needs.init.outputs.docsOnly != 'true' &&
        (needs.init.outputs.needsFullPipeline == 'true' ||
         needs.init.outputs.changesComponents == 'true' ||
         needs.init.outputs.changesOutput == 'true' ||
         needs.init.outputs.changesShowcases == 'true')
      }}
    uses: ./.github/workflows/01-build-showcases.yml
    needs: [build-packages, init]
    secrets: inherit
    with:
      showcase: angular-ssr-showcase

  build-showcase-react:
    if: >-
      ${{
        needs.init.outputs.eventVariant != 'main-push' &&
        needs.init.outputs.docsOnly != 'true' &&
        (needs.init.outputs.needsFullPipeline == 'true' ||
         needs.init.outputs.changesComponents == 'true' ||
         needs.init.outputs.changesOutput == 'true' ||
         needs.init.outputs.changesShowcases == 'true')
      }}
    uses: ./.github/workflows/01-build-showcases.yml
    needs: [build-packages, init]
    secrets: inherit
    with:
      showcase: react-showcase

  build-showcase-next:
    if: >-
      ${{
        needs.init.outputs.eventVariant != 'main-push' &&
        needs.init.outputs.docsOnly != 'true' &&
        (needs.init.outputs.needsFullPipeline == 'true' ||
         needs.init.outputs.changesComponents == 'true' ||
         needs.init.outputs.changesOutput == 'true' ||
         needs.init.outputs.changesShowcases == 'true')
      }}
    uses: ./.github/workflows/01-build-showcases.yml
    needs: [build-packages, init]
    secrets: inherit
    with:
      showcase: next-showcase

  build-showcase-vue:
    if: >-
      ${{
        needs.init.outputs.eventVariant != 'main-push' &&
        needs.init.outputs.docsOnly != 'true' &&
        (needs.init.outputs.needsFullPipeline == 'true' ||
         needs.init.outputs.changesComponents == 'true' ||
         needs.init.outputs.changesOutput == 'true' ||
         needs.init.outputs.changesShowcases == 'true')
      }}
    uses: ./.github/workflows/01-build-showcases.yml
    needs: [build-packages, init]
    secrets: inherit
    with:
      showcase: vue-showcase

  build-showcase-nuxt:
    if: >-
      ${{
        needs.init.outputs.eventVariant != 'main-push' &&
        needs.init.outputs.docsOnly != 'true' &&
        (needs.init.outputs.needsFullPipeline == 'true' ||
         needs.init.outputs.changesComponents == 'true' ||
         needs.init.outputs.changesOutput == 'true' ||
         needs.init.outputs.changesShowcases == 'true')
      }}
    uses: ./.github/workflows/01-build-showcases.yml
    needs: [build-packages, init]
    secrets: inherit
    with:
      showcase: nuxt-showcase

  # Patternhub: when docs/, foundations, or components changed
  build-showcase-patternhub:
    if: >-
      ${{
        needs.init.outputs.docsOnly != 'true' &&
        (needs.init.outputs.needsFullPipeline == 'true' ||
         needs.init.outputs.changesPatternhub == 'true')
      }}
    uses: ./.github/workflows/01-build-patternhub.yml
    needs: [build-packages, init]
    with:
      baseUrl: ${{ needs.init.outputs.baseUrl }}
    secrets: inherit

  # Showcase tests: same conditions as showcase builds
  test-showcase-stencil:
    if: >-
      ${{
        needs.init.outputs.eventVariant != 'main-push' &&
        needs.init.outputs.docsOnly != 'true' &&
        (needs.init.outputs.needsFullPipeline == 'true' ||
         needs.init.outputs.changesComponents == 'true' ||
         needs.init.outputs.changesOutput == 'true' ||
         needs.init.outputs.changesShowcases == 'true')
      }}
    uses: ./.github/workflows/02-e2e-showcases.yml
    needs: [build-showcase-stencil, init]
    secrets: inherit
    with:
      version: ${{ needs.init.outputs.playwrightVersion }}
      showcase: stencil-showcase

  test-showcase-angular:
    if: >-
      ${{
        needs.init.outputs.eventVariant != 'main-push' &&
        needs.init.outputs.docsOnly != 'true' &&
        (needs.init.outputs.needsFullPipeline == 'true' ||
         needs.init.outputs.changesComponents == 'true' ||
         needs.init.outputs.changesOutput == 'true' ||
         needs.init.outputs.changesShowcases == 'true')
      }}
    uses: ./.github/workflows/02-e2e-showcases.yml
    needs: [build-showcase-angular, init]
    secrets: inherit
    with:
      version: ${{ needs.init.outputs.playwrightVersion }}
      showcase: angular-showcase

  test-showcase-react:
    if: >-
      ${{
        needs.init.outputs.eventVariant != 'main-push' &&
        needs.init.outputs.docsOnly != 'true' &&
        (needs.init.outputs.needsFullPipeline == 'true' ||
         needs.init.outputs.changesComponents == 'true' ||
         needs.init.outputs.changesOutput == 'true' ||
         needs.init.outputs.changesShowcases == 'true')
      }}
    uses: ./.github/workflows/02-e2e-showcases.yml
    needs: [build-showcase-react, init]
    secrets: inherit
    with:
      version: ${{ needs.init.outputs.playwrightVersion }}
      showcase: react-showcase

  test-showcase-vue:
    if: >-
      ${{
        needs.init.outputs.eventVariant != 'main-push' &&
        needs.init.outputs.docsOnly != 'true' &&
        (needs.init.outputs.needsFullPipeline == 'true' ||
         needs.init.outputs.changesComponents == 'true' ||
         needs.init.outputs.changesOutput == 'true' ||
         needs.init.outputs.changesShowcases == 'true')
      }}
    uses: ./.github/workflows/02-e2e-showcases.yml
    needs: [build-showcase-vue, init]
    secrets: inherit
    with:
      version: ${{ needs.init.outputs.playwrightVersion }}
      showcase: vue-showcase

  test-showcase-patternhub:
    if: >-
      ${{
        needs.init.outputs.eventVariant != 'main-push' &&
        needs.init.outputs.docsOnly != 'true' &&
        (needs.init.outputs.needsFullPipeline == 'true' ||
         needs.init.outputs.changesPatternhub == 'true')
      }}
    uses: ./.github/workflows/02-e2e-patternhub.yml
    needs: [build-showcase-patternhub, init]
    secrets: inherit
    with:
      version: ${{ needs.init.outputs.playwrightVersion }}
      baseUrl: ${{ needs.init.outputs.baseUrl }}

  # Skips on merge_group events (condition requires pull_request)
  regenerate-snapshots-components:
    if: >-
      ${{
        (needs.init.outputs.eventVariant == 'pull-request' ||
         needs.init.outputs.eventVariant == 'changeset-release') &&
        !cancelled() &&
        needs.test-components.result == 'failure'
      }}
    uses: ./.github/workflows/02-e2e-regenerate.yml
    secrets: inherit
    with:
      version: ${{ needs.init.outputs.playwrightVersion }}
      type: components
    needs: [test-components, init]

  # Skips on merge_group events (condition requires pull_request)
  regenerate-snapshots-foundations:
    if: >-
      ${{
        (needs.init.outputs.eventVariant == 'pull-request' ||
         needs.init.outputs.eventVariant == 'changeset-release') &&
        !cancelled() &&
        needs.test-foundations.result == 'failure'
      }}
    uses: ./.github/workflows/02-e2e-regenerate.yml
    secrets: inherit
    with:
      version: ${{ needs.init.outputs.playwrightVersion }}
      type: foundations
    needs: [test-foundations, init]

  # Skips on merge_group events (condition requires pull_request)
  regenerate-snapshots-patternhub:
    if: >-
      ${{
        (needs.init.outputs.eventVariant == 'pull-request' ||
         needs.init.outputs.eventVariant == 'changeset-release') &&
        !cancelled() &&
        needs.test-showcase-patternhub.result == 'failure'
      }}
    uses: ./.github/workflows/02-e2e-regenerate.yml
    secrets: inherit
    with:
      version: ${{ needs.init.outputs.playwrightVersion }}
      path: ${{ needs.init.outputs.baseUrl }}
      type: patternhub
    needs: [build-showcase-patternhub, test-showcase-patternhub, init]

  # Screen reader test (costly guidepup/VoiceOver runs): only in the merge queue.
  # PRs and push-to-main skip these — they run once per merge_group validation
  # against the latest base, plus on release/workflow_dispatch.
  test-screen-reader:
    if: >-
      ${{
        needs.init.outputs.docsOnly != 'true' &&
        (needs.init.outputs.eventVariant == 'release' ||
         needs.init.outputs.eventVariant == 'workflow-dispatch' ||
         (needs.init.outputs.eventVariant == 'merge-queue' &&
          (needs.init.outputs.changesAria == 'true' ||
           needs.init.outputs.needsFullPipeline == 'true' ||
           needs.init.outputs.changesComponents == 'true' ||
           needs.init.outputs.changesShowcases == 'true')))
      }}
    uses: ./.github/workflows/02-e2e-screen-reader.yml
    needs: [test-showcase-react, init-playwright, init]
    secrets: inherit
    with:
      version: ${{ needs.init.outputs.playwrightVersion }}

  # Skips on merge_group events (condition requires pull_request)
  regenerate-snapshots:
    if: >-
      ${{
        (needs.init.outputs.eventVariant == 'pull-request' ||
         needs.init.outputs.eventVariant == 'changeset-release') &&
        !cancelled() &&
        !contains(github.actor, '[bot]') &&
        (needs.test-showcase-angular.result == 'failure' ||
         needs.test-showcase-react.result == 'failure' ||
         needs.test-showcase-vue.result == 'failure' ||
         needs.test-showcase-stencil.result == 'failure')
      }}
    uses: ./.github/workflows/02-e2e-regenerate.yml
    secrets: inherit
    with:
      version: ${{ needs.init.outputs.playwrightVersion }}
      type: showcases
    needs:
      [
        test-showcase-angular,
        test-showcase-react,
        test-showcase-vue,
        test-showcase-stencil,
        init
      ]

  # Skips on merge_group events (condition requires pull_request)
  commit-regenerated-snapshots:
    uses: ./.github/workflows/02-e2e-regenerated-snapshots-commit.yml
    secrets: inherit
    if: >-
      ${{
        (needs.init.outputs.eventVariant == 'pull-request' ||
         needs.init.outputs.eventVariant == 'changeset-release') &&
        !cancelled() &&
        (needs.regenerate-snapshots-components.result == 'success' ||
         needs.regenerate-snapshots-foundations.result == 'success' ||
         needs.regenerate-snapshots-patternhub.result == 'success' ||
         needs.regenerate-snapshots.result == 'success')
      }}
    needs:
      [
        regenerate-snapshots-components,
        regenerate-snapshots-foundations,
        regenerate-snapshots-patternhub,
        regenerate-snapshots,
        init
      ]
    with:
      showcases: ${{ needs.regenerate-snapshots.result == 'success' }}
      components: ${{ needs.regenerate-snapshots-components.result == 'success' }}
      foundations: ${{ needs.regenerate-snapshots-foundations.result == 'success' }}
      patternhub: ${{ needs.regenerate-snapshots-patternhub.result == 'success' }}

  # Reports status on all events including merge_group (required check for Merge Queue gate)
  # Accepts "skipped" for jobs that were correctly skipped due to path filtering or push-to-main
  checks-done:
    if: ${{ !cancelled() }}
    runs-on: ubuntu-24.04
    steps:
      - name: 🎉 Checks done
        env:
          IS_RELEASE: ${{ needs.init.outputs.eventVariant == 'release' }}
          IS_CHANGESET_RELEASE: ${{ needs.init.outputs.eventVariant == 'changeset-release' }}
          IS_MAIN_PUSH: ${{ needs.init.outputs.eventVariant == 'main-push' }}
          IS_DOCS_ONLY: ${{ needs.init.outputs.docsOnly }}
        run: |
          if [[ $IS_CHANGESET_RELEASE == "true" ]]; then
            echo "🎉 Changeset release PR - skipping checks."
            exit 0
          fi

          if [[ "$IS_DOCS_ONLY" == "true" ]]; then
            echo "📄 Docs-only change - no builds or tests required."
            exit 0
          fi

          resultBuildStorybookComposition="${{ needs.build-storybook-composition.result }}"
          resultBuildStorybookAngular="${{ needs.build-storybook-angular.result }}"
          resultBuildStorybookHtml="${{ needs.build-storybook-html.result }}"
          resultBuildStorybookReact="${{ needs.build-storybook-react.result }}"
          resultBuildStorybookVue="${{ needs.build-storybook-vue.result }}"
          resultBuildShowcaseStencil="${{ needs.build-showcase-stencil.result }}"
          resultBuildShowcaseAngular="${{ needs.build-showcase-angular.result }}"
          resultBuildShowcaseAngularSSR="${{ needs.build-showcase-angular-ssr.result }}"
          resultBuildShowcaseReact="${{ needs.build-showcase-react.result }}"
          resultBuildShowcaseNext="${{ needs.build-showcase-next.result }}"
          resultBuildShowcaseVue="${{ needs.build-showcase-vue.result }}"
          resultBuildShowcaseNuxt="${{ needs.build-showcase-nuxt.result }}"
          resultBuildShowcasePatternhub="${{ needs.build-showcase-patternhub.result }}"
          resultBuildOutputs="${{ needs.build-outputs.result }}"
          resultTestVitePlugin="${{ needs.test-vite-plugin.result }}"
          resultTestComponents="${{ needs.test-components.result }}"
          resultTestFoundations="${{ needs.test-foundations.result }}"
          resultTestShowcaseStencil="${{ needs.test-showcase-stencil.result }}"
          resultTestShowcaseAngular="${{ needs.test-showcase-angular.result }}"
          resultTestShowcaseReact="${{ needs.test-showcase-react.result }}"
          resultTestShowcaseVue="${{ needs.test-showcase-vue.result }}"
          resultTestShowcasePatternhub="${{ needs.test-showcase-patternhub.result }}"
          resultTestScreenReader="${{ needs.test-screen-reader.result }}"
          resultTestFigmaCodeConnect="${{ needs.test-figma-code-connect.result }}"

          echo "IS_MAIN_PUSH: $IS_MAIN_PUSH"
          echo "IS_DOCS_ONLY: $IS_DOCS_ONLY"

          # On push-to-main, verify builds that still run (tests skipped, validated by merge queue)
          if [[ "$IS_MAIN_PUSH" == "true" ]]; then
            echo "📦 Push to main - only verifying build results (tests skipped, validated by merge queue)."
            resultBuildPackages="${{ needs.build-packages.result }}"
            FAILED=false

            check_main_result() {
              local name=$1
              local result=$2
              if [[ "$result" != "success" && "$result" != "skipped" ]]; then
                echo "❌ $name: $result"
                FAILED=true
              fi
            }

            check_main_result "build-packages" "$resultBuildPackages"
            check_main_result "build-storybook-composition" "$resultBuildStorybookComposition"
            check_main_result "build-storybook-angular" "$resultBuildStorybookAngular"
            check_main_result "build-storybook-html" "$resultBuildStorybookHtml"
            check_main_result "build-storybook-react" "$resultBuildStorybookReact"
            check_main_result "build-storybook-vue" "$resultBuildStorybookVue"
            check_main_result "build-showcase-patternhub" "$resultBuildShowcasePatternhub"

            if [[ "$FAILED" == "true" ]]; then
              echo "Some builds were failing."
              exit 1
            else
              echo "🎉 All required builds were successful."
              exit 0
            fi
          fi

          # For PR/merge_group/release: verify all jobs that ran succeeded
          # Jobs that were skipped due to path filtering are allowed
          FAILED=false

          check_result() {
            local name=$1
            local result=$2
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "❌ $name: $result"
              FAILED=true
            fi
          }

          check_result "build-storybook-composition" "$resultBuildStorybookComposition"
          check_result "build-storybook-angular" "$resultBuildStorybookAngular"
          check_result "build-storybook-html" "$resultBuildStorybookHtml"
          check_result "build-storybook-react" "$resultBuildStorybookReact"
          check_result "build-storybook-vue" "$resultBuildStorybookVue"
          check_result "build-showcase-stencil" "$resultBuildShowcaseStencil"
          check_result "build-showcase-angular" "$resultBuildShowcaseAngular"
          check_result "build-showcase-angular-ssr" "$resultBuildShowcaseAngularSSR"
          check_result "build-showcase-react" "$resultBuildShowcaseReact"
          check_result "build-showcase-next" "$resultBuildShowcaseNext"
          check_result "build-showcase-vue" "$resultBuildShowcaseVue"
          check_result "build-showcase-nuxt" "$resultBuildShowcaseNuxt"
          check_result "build-showcase-patternhub" "$resultBuildShowcasePatternhub"
          check_result "build-outputs" "$resultBuildOutputs"
          check_result "test-vite-plugin" "$resultTestVitePlugin"
          check_result "test-components" "$resultTestComponents"
          check_result "test-foundations" "$resultTestFoundations"
          check_result "test-showcase-stencil" "$resultTestShowcaseStencil"
          check_result "test-showcase-angular" "$resultTestShowcaseAngular"
          check_result "test-showcase-react" "$resultTestShowcaseReact"
          check_result "test-showcase-vue" "$resultTestShowcaseVue"
          check_result "test-showcase-patternhub" "$resultTestShowcasePatternhub"
          check_result "test-screen-reader" "$resultTestScreenReader"
          check_result "test-figma-code-connect" "$resultTestFigmaCodeConnect"

          if [[ "$FAILED" == "true" ]]; then
            echo "Some checks were failing."
            exit 1
          else
            echo "🎉 All checks passed (skipped jobs are OK due to path filtering)."
            exit 0
          fi
    needs:
      [
        build-packages,
        build-storybook-composition,
        build-storybook-angular,
        build-storybook-html,
        build-storybook-react,
        build-storybook-vue,
        build-showcase-stencil,
        build-showcase-angular,
        build-showcase-angular-ssr,
        build-showcase-react,
        build-showcase-next,
        build-showcase-vue,
        build-showcase-nuxt,
        build-showcase-patternhub,
        build-outputs,
        test-figma-code-connect,
        test-components,
        test-vite-plugin,
        test-showcase-stencil,
        test-showcase-angular,
        test-showcase-react,
        test-showcase-vue,
        test-showcase-patternhub,
        test-foundations,
        test-screen-reader,
        init
      ]

  deploy:
    uses: ./.github/workflows/03-deploy-gh-pages.yml
    if: >-
      ${{
        !cancelled() &&
        github.actor != 'dependabot[bot]' &&
        ((needs.init.outputs.eventVariant != 'pull-request' &&
          needs.init.outputs.eventVariant != 'changeset-release') ||
         github.event.pull_request.head.repo.owner.login == 'db-ux-design-system') &&
        needs.init.outputs.eventVariant != 'changeset-release' &&
        needs.init.outputs.docsOnly != 'true' &&
        needs.checks-done.result == 'success'
      }}
    needs: [checks-done, init]
    secrets: inherit
    with:
      release: ${{ needs.init.outputs.release }}
      preRelease: ${{ needs.init.outputs.preRelease }}
      name: ${{ needs.init.outputs.branchName }}
      repoName: ${{ needs.init.outputs.repoName }}
      repoOwner: ${{ needs.init.outputs.repoOwner }}

  publish-figma-code-connect:
    if: >-
      ${{
        !cancelled() &&
        github.actor != 'dependabot[bot]' &&
        needs.init.outputs.eventVariant != 'release' &&
        github.repository_owner == 'db-ux-design-system' &&
        github.ref == 'refs/heads/main' &&
        needs.checks-done.result == 'success'
      }}
    uses: ./.github/workflows/03-publish-figma-code-connect.yml
    needs: [checks-done, test-figma-code-connect, init]
    secrets: inherit

  # Skips on merge_group events (only runs on pull requests)
  preview-url-pr-description:
    if: >-
      ${{
        !cancelled() &&
        (needs.init.outputs.eventVariant == 'pull-request' ||
         needs.init.outputs.eventVariant == 'changeset-release') &&
        needs.init.outputs.docsOnly != 'true'
      }}
    needs: [deploy, init]
    uses: ./.github/workflows/03-preview-url-pr-description.yml

  publishpackages:
    if: ${{ !cancelled() && needs.checks-done.result == 'success' }}
    uses: ./.github/workflows/03-publish-packages.yml
    needs: [init, checks-done, build-outputs]
    secrets: inherit
    with:
      release: ${{ needs.init.outputs.release }}
      preRelease: ${{ needs.init.outputs.preRelease }}
      version: ${{ needs.init.outputs.version }}
