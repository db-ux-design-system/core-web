packages:
  - "packages/*"
  - "output/*"
  - "showcases/*"
  - "storybooks/*"
  - "docs"
  - "scripts"
  - "figma-code-connect/*"

allowBuilds:
  "@compodoc/compodoc": false
  "@db-ux/db-theme": true
  "@db-ux/db-theme-fonts": true
  "@db-ux/db-theme-icons": true
  "@db-ux/db-theme-illustrative-icons": true
  "@parcel/watcher": false
  accessibility-checker: false
  chromedriver: false
  core-js: false
  esbuild: true
  ffmpeg-static: false
  lmdb: false
  msgpackr-extract: false
  puppeteer: true
  rs-module-lexer: false
  sharp: false
  svelte-preprocess: false
  ttf2woff2: false
  unrs-resolver: false

engineStrict: true

minimumReleaseAgeExclude:
  - svelte@5.55.7
  - devalue@5.8.1
  - got@11.8.5
  - marked@0.7.0
  - semver-regex@3.1.3
  - semver-regex@3.1.4
  - marked@4.0.10
  - ajv@8.18.0
  - file-type@21.3.1
  - picomatch@4.0.4
  - postcss@8.5.10
  - uuid@11.1.1
  - ip-address@10.1.1

overrides:
  ajv@>=7.0.0-alpha.0 <8.18.0: ^8.18.0
  devalue@>=5.6.3 <=5.8.0: ^5.8.1
  file-type@>=13.0.0 <21.3.1: ^21.3.1
  got@<11.8.5: ^11.8.5
  ip-address@<=10.1.0: ^10.1.1
  marked@<4.0.10: ^4.0.10
  marked@>=0.4.0 <0.7.0: ^0.7.0
  picomatch@>=4.0.0 <4.0.4: ^4.0.4
  postcss@<8.5.10: ^8.5.10
  semver-regex@<3.1.3: ^3.1.3
  semver-regex@<3.1.4: ^3.1.4
  svelte@<=5.55.6: ^5.55.7
  svelte@>=5.46.0 <=5.55.6: ^5.55.7
  svelte@>=5.51.5 <=5.55.6: ^5.55.7
  uuid@>=11.0.0 <11.1.1: ^11.1.1

saveExact: true
