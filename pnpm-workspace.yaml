packages:
  - "packages/*"
  - "output/*"
  - "showcases/*"
  - "storybooks/*"
  - "docs"
  - "scripts"
  - "figma-code-connect/*"

allowBuilds:
  "@compodoc/compodoc": false
  "@db-ux/db-theme": true
  "@db-ux/db-theme-fonts": true
  "@db-ux/db-theme-icons": true
  "@db-ux/db-theme-illustrative-icons": true
  "@parcel/watcher": false
  accessibility-checker: false
  chromedriver: false
  core-js: false
  esbuild: true
  ffmpeg-static: true
  lmdb: false
  msgpackr-extract: false
  puppeteer: true
  rs-module-lexer: false
  sharp: false
  svelte-preprocess: false
  ttf2woff2: false
  unrs-resolver: false

auditConfig:
  ignoreGhsas:
    # @angular/compiler: patched version >=18.2.15 does not exist (latest v18-lts is 18.2.14).
    # Vulnerability is in @builder.io/mitosis transitive dep, not exploitable in our build context.
    - GHSA-jrmj-c5cx-3cw6
    - GHSA-v4hv-rgfq-gp49
    # @angular/compiler <=19.2.25: XSS via two-way property binding sanitization bypass.
    # Transitive dep of @builder.io/mitosis, only used at build time, not exploitable.
    # Override forces >=19.2.26 but audit still reports due to declared range in mitosis.
    - GHSA-58w9-8g37-x9v5
    # @angular/compiler <=18.2.14: XSS via template/attribute namespace sanitization bypass.
    # Same context as above — mitosis transitive dep, build-only, override applied.
    - GHSA-f3m7-gqxr-g87x
    # esbuild: patched version >=0.24.3 does not exist on npm.
    # Vulnerability only affects esbuild dev server (not used in production builds).
    - GHSA-67mh-4wv8-2f99
    # html-minifier: patched version >=4.0.1 does not exist (project abandoned).
    # Transitive dep of sassdoc-theme-default, dev-only, no user input processed.
    - GHSA-pfq8-rq6v-vf5m
    # sassdoc-extras: patched version >=3.0.1 does not exist.
    # Transitive dep of sassdoc-theme-default, dev-only.
    - GHSA-3mpm-jx38-9m8w
    # decompress: patched version >=4.2.2 does not exist (project abandoned at 4.2.1).
    # Transitive dep of @guidepup/setup, dev-only, not exploitable in our build context.
    - GHSA-mp2f-45pm-3cg9

engineStrict: true

minimumReleaseAgeExclude:
  - uuid@11.1.1
  - qs@6.15.2
  - hono@4.12.21 || 4.12.27
  - brace-expansion@1.1.16 || 5.0.6
  - got@11.8.5
  - marked@4.0.10
  - semver-regex@3.1.3 || 3.1.4
  - svelte@4.2.19 || 5.51.5 || 5.53.5 || 5.55.7
  - ajv@8.18.0
  - file-type@21.3.1
  - picomatch@4.0.4
  - ip-address@10.1.1
  - webpack-dev-server@5.2.4 || 5.2.6
  - "@db-ux/db-theme"
  - "@db-ux/db-theme-fonts"
  - "@db-ux/db-theme-icons"
  - "@db-ux/db-theme-illustrative-icons"
  - esbuild@0.28.1
  - form-data@4.0.6
  - vite@7.3.5
  - js-yaml@3.15.0 || 4.1.2
  - "@babel/core@7.29.1"
  - markdown-it@14.1.2
  - http-proxy-middleware@3.0.6 || 3.0.7
  - piscina@5.1.5
  - undici@6.27.0 || 7.28.0
  - shell-quote@1.8.5
  - body-parser@2.3.0
  - "@hono/node-server@2.0.5"
  - immutable@5.1.8
  - svgo@3.3.4 || 4.0.2
  - fast-uri@3.1.3 || 3.1.4
  - sharp@0.35.0

overrides:
  "@babel/core@<=7.29.0": ^7.29.1
  "@hono/node-server@<2.0.5": ^2.0.5
  ajv@>=7.0.0-alpha.0 <8.18.0: ^8.18.0
