  postcss@<8.5.19: 8.5.19
  qs@>=6.11.1 <=6.15.1: ^6.15.2
  semver-regex@<3.1.3: ^3.1.3
  semver-regex@<3.1.4: ^3.1.4
  sharp@<0.35.0: ^0.35.0
