packages:
  - "packages/*"
  - "output/*"
  - "showcases/*"
  - "storybooks/*"
  - "docs"
  - "scripts"
  - "figma-code-connect/*"

allowBuilds:
  "@compodoc/compodoc": false
  "@db-ux/db-theme": true
  "@db-ux/db-theme-fonts": true
  "@db-ux/db-theme-icons": true
  "@db-ux/db-theme-illustrative-icons": true
  "@parcel/watcher": false
  accessibility-checker: false
  chromedriver: false
  core-js: false
  esbuild: true
  ffmpeg-static: false
  lmdb: false
  msgpackr-extract: false
  puppeteer: true
  rs-module-lexer: false
  sharp: false
  svelte-preprocess: false
  ttf2woff2: false
  unrs-resolver: false

auditConfig:
  ignoreGhsas:
    # @angular/compiler: patched version >=18.2.15 does not exist (latest v18-lts is 18.2.14).
    # Vulnerability is in @builder.io/mitosis transitive dep, not exploitable in our build context.
    - GHSA-jrmj-c5cx-3cw6
    - GHSA-v4hv-rgfq-gp49
    # esbuild: patched version >=0.24.3 does not exist on npm.
    # Vulnerability only affects esbuild dev server (not used in production builds).
    - GHSA-67mh-4wv8-2f99
    # html-minifier: patched version >=4.0.1 does not exist (project abandoned).
    # Transitive dep of sassdoc-theme-default, dev-only, no user input processed.
    - GHSA-pfq8-rq6v-vf5m
    # sassdoc-extras: patched version >=3.0.1 does not exist.
    # Transitive dep of sassdoc-theme-default, dev-only.
    - GHSA-3mpm-jx38-9m8w

engineStrict: true

minimumReleaseAgeExclude:
  - uuid@11.1.1
  - qs@6.15.2
  - hono@4.12.21
  - brace-expansion@5.0.6
  - got@11.8.5
  - marked@4.0.10
  - semver-regex@3.1.3
  - semver-regex@3.1.4
  - svelte@4.2.19
  - svelte@5.51.5
  - ajv@8.18.0
  - file-type@21.3.1
  - svelte@5.53.5
  - picomatch@4.0.4
  - postcss@8.5.10
  - ip-address@10.1.1
  - webpack-dev-server@5.2.4
  - svelte@5.55.7
  - "@db-ux/db-theme@5.8.0"
  - esbuild@0.28.1
  - form-data@4.0.6
  - vite@7.3.5
  - js-yaml@4.1.2
  - "@babel/core@7.29.1"
  - markdown-it@14.1.2
  - http-proxy-middleware@3.0.7
  - http-proxy-middleware@3.0.6
  - piscina@5.1.5
  - undici@7.28.0
  - undici@6.27.0

overrides:
  "@babel/core@<=7.29.0": ^7.29.1
  ajv@>=7.0.0-alpha.0 <8.18.0: ^8.18.0
  brace-expansion@>=5.0.0 <5.0.6: ^5.0.6
  esbuild@>=0.27.3 <0.28.1: ^0.28.1
  file-type@>=13.0.0 <21.3.1: ^21.3.1
  form-data@>=4.0.0 <4.0.6: ^4.0.6
  got@<11.8.5: ^11.8.5
  hono@<4.12.21: ^4.12.21
  http-proxy-middleware@>=0.16.0 <3.0.6: ^3.0.6
  http-proxy-middleware@>=3.0.4 <3.0.7: ^3.0.7
  ip-address@<=10.1.0: ^10.1.1
  js-yaml@<=4.1.1: ^4.1.2
  markdown-it@<=14.1.1: ^14.1.2
  marked@<4.0.10: ^4.0.10
  picomatch@>=4.0.0 <4.0.4: ^4.0.4
  piscina@>=5.0.0-alpha.0 <=5.1.4: ^5.1.5
  postcss@<8.5.10: ^8.5.10
  qs@>=6.11.1 <=6.15.1: ^6.15.2
  semver-regex@<3.1.3: ^3.1.3
  semver-regex@<3.1.4: ^3.1.4
  svelte@<4.2.19: ^4.2.19
  svelte@<=5.51.4: ^5.51.5
  svelte@<=5.53.4: ^5.53.5
  svelte@<=5.55.6: ^5.55.7
  undici@<6.27.0: ^6.27.0
  undici@>=7.0.0 <7.28.0: ^7.28.0
  undici@>=7.23.0 <7.28.0: ^7.28.0
  uuid@<11.1.1: ^11.1.1
  vite@>=7.0.0 <=7.3.4: ^7.3.5
  webpack-dev-server@<=5.2.3: ^5.2.4

saveExact: true
