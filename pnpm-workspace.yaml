packages:
  - "packages/*"
  - "output/*"
  - "showcases/*"
  - "storybooks/*"
  - "docs"
  - "scripts"

allowBuilds:
  "@compodoc/compodoc": false
  "@db-ux/db-theme": true
  "@db-ux/db-theme-fonts": true
  "@db-ux/db-theme-icons": true
  "@db-ux/db-theme-illustrative-icons": true
  "@parcel/watcher": false
  accessibility-checker: false
  chromedriver: false
  core-js: false
  esbuild: true
  ffmpeg-static: false
  lmdb: false
  msgpackr-extract: false
  puppeteer: true
  rs-module-lexer: false
  sharp: false
  svelte-preprocess: false
  ttf2woff2: false
  unrs-resolver: false

engineStrict: true
saveExact: true

minimumReleaseAgeExclude:
  - got@11.8.5
  - semver-regex@3.1.3
  - marked@4.0.10
  - svelte@4.2.19
  - esbuild@0.24.3
  - html-minifier@4.0.1
  - "@angular/compiler@18.2.15"
  - svelte@5.51.5
  - serialize-javascript@7.0.3
  - ajv@8.18.0
  - file-type@21.3.1
  - svelte@5.53.5
  - picomatch@4.0.4
  - serialize-javascript@7.0.5
  - "@xmldom/xmldom@0.8.13"
  - postcss@8.5.10
  - "@xmldom/xmldom@0.8.12"
  - uuid@11.1.1
  - ip-address@10.1.1
  - marked@0.7.0
  - semver-regex@3.1.4
  - sassdoc-extras@3.0.1
  - hono@4.12.18

overrides:
  "@angular/compiler@<=18.2.14": ^18.2.15
  ajv@>=7.0.0-alpha.0 <8.18.0: ^8.18.0
  esbuild@<=0.24.2: ^0.24.3
  file-type@>=13.0.0 <21.3.1: ^21.3.1
  got@<11.8.5: ^11.8.5
  hono@<4.12.18: ^4.12.18
  html-minifier@<=4.0.0: ^4.0.1
  ip-address@<=10.1.0: ^10.1.1
  marked@<4.0.10: ^4.0.10
  marked@>=0.4.0 <0.7.0: ^0.7.0
  picomatch@>=4.0.0 <4.0.4: ^4.0.4
  postcss@<8.5.10: ^8.5.10
  sassdoc-extras@<=3.0.0: ^3.0.1
  semver-regex@<3.1.3: ^3.1.3
  semver-regex@<3.1.4: ^3.1.4
  svelte@<4.2.19: ^4.2.19
  svelte@<=5.51.4: ^5.51.5
  svelte@<=5.53.4: ^5.53.5
  uuid@>=11.0.0 <11.1.1: ^11.1.1
