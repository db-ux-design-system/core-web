packages:
  - "packages/*"
  - "output/*"
  - "showcases/*"
  - "storybooks/*"
  - "docs"
  - "scripts"
  - "figma-code-connect/*"

allowBuilds:
  "@compodoc/compodoc": false
  "@db-ux/db-theme": true
  "@db-ux/db-theme-fonts": true
  "@db-ux/db-theme-icons": true
  "@db-ux/db-theme-illustrative-icons": true
  "@parcel/watcher": false
  accessibility-checker: false
  chromedriver: false
  core-js: false
  esbuild: true
  ffmpeg-static: false
  lmdb: false
  msgpackr-extract: false
  puppeteer: true
  rs-module-lexer: false
  sharp: false
  svelte-preprocess: false
  ttf2woff2: false
  unrs-resolver: false

engineStrict: true

minimumReleaseAgeExclude:
  - svelte@5.55.7
  - devalue@5.8.1

overrides:
  devalue@>=5.6.3 <=5.8.0: ^5.8.1
  svelte@<=5.55.6: ^5.55.7
  svelte@>=5.46.0 <=5.55.6: ^5.55.7
  svelte@>=5.51.5 <=5.55.6: ^5.55.7

saveExact: true
