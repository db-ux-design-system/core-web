packages:
  - "packages/*"
  - "output/*"
  - "showcases/*"
  - "storybooks/*"
  - "docs"
  - "scripts"
  - "figma-code-connect/*"

allowBuilds:
  "@compodoc/compodoc": false
  "@db-ux/db-theme": true
  "@db-ux/db-theme-fonts": true
  "@db-ux/db-theme-icons": true
  "@db-ux/db-theme-illustrative-icons": true
  "@parcel/watcher": false
  accessibility-checker: false
  chromedriver: false
  core-js: false
  esbuild: true
  ffmpeg-static: false
  lmdb: false
  msgpackr-extract: false
  puppeteer: true
  rs-module-lexer: false
  sharp: false
  svelte-preprocess: false
  ttf2woff2: false
  unrs-resolver: false

engineStrict: true
saveExact: true

minimumReleaseAgeExclude:
  - got@11.8.5
  - semver-regex@3.1.3
  - marked@4.0.10
  - svelte@4.2.19
  - esbuild@0.24.3
  - html-minifier@4.0.1
  - "@angular/compiler@18.2.15"
  - svelte@5.51.5
  - serialize-javascript@7.0.3
  - ajv@8.18.0
  - file-type@21.3.1
  - svelte@5.53.5
  - picomatch@4.0.4
  - serialize-javascript@7.0.5
  - "@xmldom/xmldom@0.8.13"
  - postcss@8.5.10
  - "@xmldom/xmldom@0.8.12"
  - uuid@11.1.1
  - ip-address@10.1.1
  - marked@0.7.0
  - semver-regex@3.1.4
  - sassdoc-extras@3.0.1
