packages:
  - "packages/*"
  - "output/*"
  - "showcases/*"
  - "storybooks/*"
  - "docs"
  - "scripts"
  - "figma-code-connect/*"

allowBuilds:
  "@compodoc/compodoc": false
  "@db-ux/db-theme": true
  "@db-ux/db-theme-fonts": true
  "@db-ux/db-theme-icons": true
  "@db-ux/db-theme-illustrative-icons": true
  "@parcel/watcher": false
  accessibility-checker: false
  chromedriver: false
  core-js: false
  esbuild: true
  ffmpeg-static: false
  lmdb: false
  msgpackr-extract: false
  puppeteer: true
  rs-module-lexer: false
  sharp: false
  svelte-preprocess: false
  ttf2woff2: false
  unrs-resolver: false

engineStrict: true

minimumReleaseAgeExclude:
  - brace-expansion@5.0.6
  - uuid@11.1.1
  - qs@6.15.2
  - hono@4.12.21

overrides:
  brace-expansion@>=5.0.0 <5.0.6: ^5.0.6
  hono@<4.12.21: ^4.12.21
  qs@>=6.11.1 <=6.15.1: ^6.15.2
  uuid@<11.1.1: ^11.1.1

saveExact: true
